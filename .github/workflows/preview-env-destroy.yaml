name: Destroy Preview

on:
  pull_request:
    types:
      - closed

permissions:
  contents: write

jobs:
  destroy:
    uses: Muhammad-Ibra3/platform-engineering-project/.github/workflows/preview-destroy.yaml@main
    with:
      pr_number: preview-${{ github.event.pull_request.number }}
      gitops_repo: Muhammad-Ibra3/platform-engineering-project
    secrets: inherit